# Linked3 视频脚本生产管线 (v10.4.5)
name: video
version: "10.4.5"
description: "视频脚本生产管线 — Beat弧线 + Motion"

steps:
  - name: load_seed
    handler: "VideoFactory::pipeline_load_seed"
    optional: false
  - name: compile
    handler: "VideoFactory::pipeline_compile"
    optional: false
  - name: project
    handler: "VideoFactory::pipeline_project"
    optional: false
  - name: quality_check
    handler: "VideoFactory::pipeline_quality_check"
    optional: true
  - name: platform_adapt
    handler: "VideoFactory::pipeline_adapt"
    optional: true
