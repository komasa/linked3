# Linked3 图文脚本生产管线 (v10.4.5)
name: charts
version: "10.4.5"
description: "图文脚本生产管线 — 4Band结构"

steps:
  - name: load_seed
    handler: "Linked3_Charts_Factory::pipeline_load_seed"
    optional: false
  - name: compile
    handler: "Linked3_Charts_Factory::pipeline_compile"
    optional: false
  - name: project
    handler: "Linked3_Charts_Factory::pipeline_project"
    optional: false
  - name: quality_check
    handler: "Linked3_Charts_Factory::pipeline_quality_check"
    optional: true
  - name: platform_adapt
    handler: "Linked3_Charts_Factory::pipeline_adapt"
    optional: true
