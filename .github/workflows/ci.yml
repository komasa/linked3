name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── 语法检查 ───
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Lint all PHP files
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  # ─── 编码规范 (PSR-12 + WordPress) ───
  phpcs:
    name: PHP CodeSniffer (PSR-12 + WPCS, baseline-filtered)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff baseline comparison

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install PHP_CodeSniffer + WordPress Coding Standards
        run: |
          composer global require squizlabs/php_codesniffer:^3.8
          composer global require wp-coding-standards/wpcs:^2.3
          WPCS_DIR="$(composer global config home)/vendor/wp-coding-standards/wpcs"
          phpcs --config-set installed_paths "${WPCS_DIR}"
          phpcs -i

      - name: Run PHPCS with baseline filter
        run: |
          # Run PHPCS with JSON output, then filter against .ci-baseline.json
          # Strategy:
          #   - Changed files (git diff): ALL violations enforced
          #   - Unchanged files: baseline violations suppressed
          python3 scripts/ci-phpcs-baseline-filter.py --phpcs-path=phpcs --standard=phpcs.xml

      - name: Upload checkstyle report (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-checkstyle
          path: phpcs-checkstyle.xml
          if-no-files-found: ignore

  # ─── 自动格式化检查 (PSR-12) ───
  php-cs-fixer:
    name: PHP CS Fixer (Dry Run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: php-cs-fixer:v3
          coverage: none

      - name: Run PHP CS Fixer (dry-run)
        run: php-cs-fixer fix --dry-run --diff --using-cache=no

  # ─── 静态分析 (PHPStan Level 8) ───
  phpstan:
    name: PHPStan (Level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install PHPStan
        run: composer global require phpstan/phpstan:^1.11

      - name: Run PHPStan
        run: |
          if [ -f phpstan.neon ]; then
            phpstan analyse --level=8 --error-format=github
          else
            phpstan analyse src/ lib/ --level=8 --error-format=github
          fi

  # ─── 代码复杂度检测 (PHPMD) ───
  phpmd:
    name: PHP Mess Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install PHPMD
        run: composer global require phpmd/phpmd:^2.15

      - name: Run PHPMD
        run: phpmd src/,lib/ text phpmd-ruleset.xml

  # ─── 测试 (PHPUnit) ───
  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, pdo, pdo_mysql
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        continue-on-error: true
        run: |
          if [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
          else
            echo "No PHPUnit configuration found. Skipping."
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-php${{ matrix.php-version }}
          path: coverage.xml
